specVersion: 1.3.0
description: Aweb Agent Receipt metadata indexing demo for The Graph.
repository: https://github.com/manfromnowhere143/aweb-agent-receipts
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum/contract
    name: ReceiptRegistry
    network: sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: ReceiptRegistry
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Receipt
        - AuthorityGrant
        - WorkflowRun
        - CapabilityUse
        - RedactionBoundary
        - RecoveryState
      abis:
        - name: ReceiptRegistry
          file: ./abis/ReceiptRegistry.json
      eventHandlers:
        - event: ReceiptPublished(indexed bytes32,string,string,bytes32,bool)
          handler: handleReceiptPublished
      file: ./src/receipt-registry.ts
